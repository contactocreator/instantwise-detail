<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 24px; }
    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #000;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      margin: 6px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn.android { background: #fff; }
    .btn-group { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Contacto</div>
    <div class="subtitle">앱을 다운로드하세요</div>
    <div class="btn-group" id="btnGroup">
      <a class="btn" id="androidBtn" href="https://play.google.com/store/apps/details?id=com.contacto.contactoandroid">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.3.17.64.24.99.2l11.53-11.53L12.17 9l-9 9.02c-.15.57-.1 1.17.19 1.74l-.18 4zM.69 5.4A2.48 2.48 0 0 0 .5 6.4v11.2c0 .36.07.68.19.97L12 7.25.69 5.4zm14.63-3.17L3.79.07a1.68 1.68 0 0 0-1.72.3L13.4 11.7l3.55-3.54-1.63-5.93zM15.82 13l-3.65 3.65 1.63 5.93a1.68 1.68 0 0 0 1.72-.3c.64-.51.98-1.28.98-2.05V8.07c0-.43-.14-.83-.38-1.14L15.82 13z"/></svg>
        Google Play
      </a>
      <a class="btn" id="iosBtn" href="https://apps.apple.com/kr/app/contacto/id6736873767">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store
      </a>
    </div>
  </div>

  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isAndroid = /android/i.test(ua);
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

    if (isAndroid) {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.contacto.contactoandroid';
    } else if (isIOS) {
      window.location.href = 'https://apps.apple.com/kr/app/contacto/id6736873767';
    }
  </script>
</body>
</html>
