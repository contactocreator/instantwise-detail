<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수신거부 — Contacto</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border: 1px solid #d1d5db;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
    }
    .top-bar {
      height: 8px;
      background: {% if success %}#C8D640{% else %}#f87171{% endif %};
      border-bottom: 3px solid {% if success %}#9aac00{% else %}#dc2626{% endif %};
    }
    .body {
      padding: 32px 28px;
    }
    .label {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 28px;
      font-weight: bold;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    p { font-size: 14px; line-height: 1.7; color: #444; }
    .email-tag {
      display: inline-block;
      background: #E8E4D8;
      border: 1px solid #d1d5db;
      padding: 4px 12px;
      font-size: 13px;
      margin-top: 12px;
    }
    .footer-logo {
      margin-top: 32px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #bbb;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-bar"></div>
    <div class="body">
      <div class="label">Contacto Newsletter</div>
      {% if success %}
        <h1>수신거부가<br/>완료됐습니다</h1>
        <p>더 이상 컨택토 뉴스레터를 받지 않으실 것입니다.<br/>언제든 다시 구독을 원하시면 앱에서 신청해주세요.</p>
        {% if email %}<div class="email-tag">{{ email }}</div>{% endif %}
      {% else %}
        <h1>유효하지 않은<br/>링크입니다</h1>
        <p>{{ message }}</p>
      {% endif %}
      <div class="footer-logo">CONTACTO</div>
    </div>
  </div>
</body>
</html>
